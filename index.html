<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D — Store & Profile</title>
    <style>
        :root { --bg: #0a0a0a; --card: #121212; --accent: #ff3e3e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Шапка */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--accent); letter-spacing: 3px; cursor: pointer; }
        .nav-btns button { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; }

        /* Сетки и карточки */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .product-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; position: relative; }
        .price { font-size: 1.3rem; color: var(--accent); font-weight: bold; margin: 10px 0; }
        .buy-btn { background: var(--accent); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; }

        /* Окна (Админка и ЛК) */
        .modal { display: none; background: #111; border: 1px solid #333; padding: 25px; border-radius: 15px; margin-top: 20px; }
        .admin-input { background: #000; color: white; border: 1px solid #333; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        
        /* Заказы в ЛК */
        .order-item { background: #1a1a1a; padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 3px solid var(--accent); font-size: 0.9rem; }
        .status { color: #00b140; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="location.reload()">R.I.D</div>
    <div class="nav-btns">
        <button onclick="toggleView('admin-modal')">⚙️ Админ</button>
        <button onclick="toggleView('profile-modal')" id="login-btn">👤 Войти</button>
    </div>
</nav>

<div class="container">
    <!-- ЛИЧНЫЙ КАБИНЕТ -->
    <div id="profile-modal" class="modal">
        <div id="auth-form">
            <h3>Вход в кабинет</h3>
            <input type="text" id="user-name" class="admin-input" placeholder="Введите ваше имя">
            <button class="buy-btn" onclick="login()">Создать профиль / Войти</button>
        </div>
        <div id="user-info" style="display:none;">
            <h3 id="welcome-msg">Привет, пользователь!</h3>
            <h4>Твои заказы:</h4>
            <div id="order-history">Заказов пока нет.</div>
            <button onclick="logout()" style="margin-top:20px; background:none; color:gray; border:none; cursor:pointer;">Выйти из профиля</button>
        </div>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="admin-modal" class="modal">
        <h3>Управление R.I.D</h3>
        <input type="password" id="admin-pass" class="admin-input" placeholder="Пароль администратора">
        <button class="buy-btn" onclick="checkAdmin()">Подтвердить</button>
        <div id="admin-controls" style="display:none; margin-top:20px;">
            <input type="text" id="p-name" class="admin-input" placeholder="Название товара">
            <input type="text" id="p-price" class="admin-input" placeholder="Цена (например, 3000 ₽)">
            <button class="buy-btn" style="background:#00b140" onclick="addItem()">Добавить в каталог</button>
        </div>
    </div>

    <div class="grid" id="catalog"></div>
</div>

<script>
    // База данных в браузере
    let products = JSON.parse(localStorage.getItem('rid_prod')) || [
        {name: "Футболка R.I.D Logo", price: "2500 ₽"},
        {name: "Худи Shadow", price: "4800 ₽"}
    ];
    let currentUser = localStorage.getItem('rid_user') || null;
    let orders = JSON.parse(localStorage.getItem('rid_orders')) || [];

    function render() {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = '';
        products.forEach((p, i) => {
            catalog.innerHTML += `
                <div class="product-card">
                    <div style="font-size:40px">👕</div>
                    <h3>${p.name}</h3>
                    <p class="price">${p.price}</p>
                    <button class="buy-btn" onclick="makeOrder('${p.name}', '${p.price}')">Купить</button>
                </div>
            `;
        });
        updateProfileUI();
    }

    // Логика Личного Кабинета
    function login() {
        const name = document.getElementById('user-name').value;
        if(name) {
            localStorage.setItem('rid_user', name);
            currentUser = name;
            render();
        }
    }

    function logout() {
        localStorage.removeItem('rid_user');
        currentUser = null;
        render();
    }

    function makeOrder(name, price) {
        if(!currentUser) {
            alert("Сначала войдите в Личный Кабинет!");
            toggleView('profile-modal');
            return;
        }
        const newOrder = { user: currentUser, item: name, price: price, date: new Date().toLocaleDateString() };
        orders.push(newOrder);
        localStorage.setItem('rid_orders', JSON.stringify(orders));
        alert("Заказ оформлен! Проверьте вкладку Профиль.");
        render();
    }

    function updateProfileUI() {
        if(currentUser) {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `Профиль: ${currentUser}`;
            document.getElementById('login-btn').innerText = `👤 ${currentUser}`;
            
            const history = document.getElementById('order-history');
            const userOrders = orders.filter(o => o.user === currentUser);
            history.innerHTML = userOrders.map(o => `
                <div class="order-item">
                    <b>${o.item}</b> — ${o.price}<br>
                    <span style="font-size:10px">${o.date}</span> | <span class="status">Ожидает оплаты МИР</span>
                </div>
            `).join('') || "Заказов пока нет.";
        } else {
            document.getElementById('auth-form').style.display = 'block';
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('login-btn').innerText = `👤 Войти`;
        }
    }

    // Логика Админки
    function checkAdmin() {
        if(document.getElementById('admin-pass').value === 'rid') {
            document.getElementById('admin-controls').style.display = 'block';
        } else { alert("Неверный пароль!"); }
    }

    function addItem() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        if(name && price) {
            products.push({name, price});
            localStorage.setItem('rid_prod', JSON.stringify(products));
            render();
        }
    }

    function toggleView(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    render();
</script>
</body>
</html>
