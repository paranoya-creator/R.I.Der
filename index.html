<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.Der | Dark Fantasy OS</title>
    <style>
        :root { --red: #8b0000; --gold: #c5a059; --black: #050505; --gray: #1a1a1a; }
        body { background: var(--black); color: #ccc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Панель управления (Admin) */
        .admin-panel { background: var(--gray); padding: 20px; border-bottom: 2px solid var(--red); display: none; }
        .admin-panel.active { display: block; }
        
        header { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://wallhaven.cc'); background-size: cover; border-bottom: 1px solid var(--red); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Сетка товаров */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--red); box-shadow: 0 0 20px rgba(139, 0, 0, 0.4); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        
        .btn { background: var(--red); color: white; border: none; padding: 10px 20px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; width: 100%; font-weight: bold; }
        .btn-delete { background: #444; font-size: 12px; width: auto; margin-bottom: 10px; }
        
        .admin-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--gray); color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 50%; cursor: pointer; z-index: 100; }

        /* Стили для консультантов */
        .team { display: flex; justify-content: center; gap: 50px; margin-top: 50px; border-top: 1px solid var(--red); padding-top: 40px; }
        .member { text-align: center; }
        .member img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--red); filter: grayscale(1); }
    </style>
</head>
<body>

<button class="admin-toggle" onclick="toggleAdmin()">⚙️</button>

<div class="admin-panel" id="adminPanel">
    <h3>Управление Легионом</h3>
    <input type="text" id="itemName" placeholder="Название товара">
    <input type="text" id="itemPrice" placeholder="Цена (например, 2990 ₽)">
    <input type="text" id="itemImg" placeholder="Ссылка на фото">
    <button class="btn" onclick="addItem()">Добавить вкладку товара</button>
</div>

<header>
    <h1 style="color: var(--red); letter-spacing: 10px;">R.I.Der</h1>
    <p style="color: var(--gold);">DARK FANTASY MERCHANDISE</p>
</header>

<div class="container">
    <div class="shop-grid" id="shopGrid">
        <!-- Сюда будут добавляться товары -->
    </div>

    <div class="team">
        <div class="member">
            <img src="https://placeholder.com" alt="Me">
            <h4 id="myName">Хранитель 1</h4>
            <a href="https://t.me" style="color: var(--red);">ПРИЗВАТЬ</a>
        </div>
        <div class="member">
            <img src="https://placeholder.com" alt="Friend">
            <h4 id="friendName">Хранитель 2</h4>
            <a href="https://t.me" style="color: var(--red);">ПРИЗВАТЬ</a>
        </div>
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('items')) || [
        { name: "Стандартный Артефакт", price: "2990 ₽", img: "https://placeholder.com" }
    ];

    function toggleAdmin() {
        document.getElementById('adminPanel').classList.toggle('active');
    }

    function renderItems() {
        const grid = document.getElementById('shopGrid');
        grid.innerHTML = '';
        items.forEach((item, index) => {
            grid.innerHTML += `
                <div class="card">
                    <button class="btn-delete" onclick="deleteItem(${index})">Удалить [x]</button>
                    <img src="${item.img}">
                    <h3>${item.name}</h3>
                    <p class="price" style="color:var(--gold)">${item.price}</p>
                    <button class="btn" onclick="pay()">КУПИТЬ КАРТОЙ / PAYPAL</button>
                </div>
            `;
        });
        localStorage.setItem('items', JSON.stringify(items));
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        const img = document.getElementById('itemImg').value;
        if(name && price) {
            items.push({ name, price, img: img || 'https://placeholder.com' });
            renderItems();
            toggleAdmin();
        }
    }

    function deleteItem(index) {
        items.splice(index, 1);
        renderItems();
    }

    function pay() {
        // Здесь можно вставить ссылку на твой ЮMoney или PayPal
        alert("Перенаправление на защищенный шлюз оплаты...");
        window.location.href = "https://yoomoney.ru"; // Твоя ссылка
    }

    renderItems();
</script>

</body>
</html>
