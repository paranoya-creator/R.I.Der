<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D - Premium Store</title>
    <link id="favicon" rel="icon" href="https://flaticon.com">
    <!-- Иконки для меню -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --accent: #8a2be2;
            --bg: #050505;
            --glass: rgba(138, 43, 226, 0.12);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0;
            padding-bottom: 80px; /* Отступ под меню */
        }

        .glass {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
        }

        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        h1 { margin: 0; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .container { width: 90%; max-width: 800px; margin: 20px auto; }

        /* НАВИГАЦИЯ (СНИЗУ) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { color: white; text-align: center; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--accent); }
        .nav-item i { font-size: 24px; }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; }

        /* СЕКЦИИ */
        .page { display: none; }
        .page.active { display: block; }

        /* МАГАЗИН */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { padding: 20px; text-align: center; }
        .card img { width: 100%; border-radius: 15px; }

        /* ЧАТ ПОДДЕРЖКИ */
        .chat-container { height: 70vh; display: flex; flex-direction: column; }
        #user-chat-box { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid var(--border); }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; width: fit-content; max-width: 80%; }
        .user-m { background: var(--accent); margin-left: auto; }
        .bot-m { background: #333; }

        /* АДМИНКА */
        .admin-section { padding: 20px; margin-bottom: 20px; }
        #admin-chat-monitor { background: rgba(0,0,0,0.4); height: 200px; overflow-y: auto; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .mon-msg { font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 5px 0; }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; border-radius: 10px;
        }
        button {
            background: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .role-tag { font-size: 10px; border: 1px solid var(--accent); padding: 5px; border-radius: 5px; margin-right: 5px; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="showPage('home')">R.I.D</h1>
    </header>

    <div class="container">
        <!-- СТРАНИЦА: МАГАЗИН -->
        <section id="home" class="page active">
            <h2>Магазин</h2>
            <div id="product-list" class="shop-grid"></div>
            <h2 style="margin-top:40px;">Статьи</h2>
            <div id="article-list"></div>
        </section>

        <!-- СТРАНИЦА: ПОДДЕРЖКА -->
        <section id="support" class="page">
            <div class="chat-container glass">
                <div style="padding:15px; border-bottom:1px solid var(--border); text-align:center;">Чат с поддержкой R.I.D</div>
                <div id="user-chat-box">
                    <div class="msg bot-m">Здравствуйте! Опишите вашу проблему, и администратор ответит вам здесь.</div>
                </div>
                <div style="padding:15px;">
                    <input type="text" id="user-chat-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendUserMsg()">
                </div>
            </div>
        </section>

        <!-- СТРАНИЦА: АДМИНКА -->
        <section id="admin" class="page">
            <div class="admin-section glass">
                <h3 style="color: var(--accent);">Мониторинг чата (Вопросы)</h3>
                <div id="admin-chat-monitor">
                    <!-- Сюда падают вопросы от клиентов -->
                    <div class="mon-msg" style="opacity:0.5 italic">Ожидание новых сообщений...</div>
                </div>
            </div>

            <div class="admin-section glass">
                <h3>Добавить контент</h3>
                <input type="text" id="p-name" placeholder="Название">
                <input type="number" id="p-price" placeholder="Цена">
                <input type="text" id="p-img" placeholder="Ссылка на фото">
                <textarea id="p-desc" placeholder="Описание"></textarea>
                <button onclick="addItem('product')">Добавить Товар</button>
                <button onclick="addItem('article')" style="margin-top:5px; background:#333">Добавить Статью</button>
            </div>

            <div class="admin-section glass">
                <h3>Настройки сайта</h3>
                <input type="text" id="new-pass" placeholder="Новый пароль">
                <button onclick="updatePassword()">Сменить пароль</button>
                <input type="text" id="new-icon" placeholder="URL иконки">
                <button onclick="updateIcon()" style="margin-top:5px;">Обновить иконку</button>
            </div>

            <div style="display:flex; justify-content:center; padding:10px;">
                <span class="role-tag">ВЛАДЕЛЕЦ</span>
                <span class="role-tag">ЗАМ</span>
                <span class="role-tag">АДМИН</span>
            </div>
        </section>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')">
            <i class="fa-solid fa-house"></i>
            <span>Дом</span>
        </div>
        <div class="nav-item" id="nav-support" onclick="showPage('support')">
            <i class="fa-solid fa-comment-dots"></i>
            <span>Поддержка</span>
        </div>
        <div class="nav-item" id="nav-admin" onclick="triggerAdmin()">
            <i class="fa-solid fa-user-shield"></i>
            <span>Админ</span>
        </div>
    </nav>

    <script>
        let currentPassword = "Rid1962";
        const myCard = "5599002136769405";

        // ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
        }

        // ВХОД В АДМИНКУ
        function triggerAdmin() {
            let p = prompt("Введите пароль администратора:");
            if (p === currentPassword) {
                showPage('admin');
            } else {
                alert("Доступ закрыт.");
            }
        }

        // РАБОТА ЧАТА
        function sendUserMsg() {
            let inp = document.getElementById('user-chat-input');
            if(!inp.value) return;

            // Добавляем в окно пользователя
            let msgHtml = `<div class="msg user-m">${inp.value}</div>`;
            document.getElementById('user-chat-box').innerHTML += msgHtml;

            // ДУБЛИРУЕМ В АДМИНКУ (п. 11)
            let time = new Date().toLocaleTimeString();
            let adminMon = document.getElementById('admin-chat-monitor');
            adminMon.innerHTML = `<div class="mon-msg"><b>[${time}] Клиент:</b> ${inp.value}</div>` + adminMon.innerHTML;

            inp.value = '';
            // Скролл вниз
            let box = document.getElementById('user-chat-box');
            box.scrollTop = box.scrollHeight;
        }

        // ДОБАВЛЕНИЕ ТОВАРА
        function addItem(type) {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value || 'https://placeholder.com';
            const desc = document.getElementById('p-desc').value;

            if(type === 'product') {
                const html = `
                    <div class="card glass">
                        <img src="${img}">
                        <h3>${name}</h3>
                        <p style="font-size:12px; opacity:0.7">${desc}</p>
                        <div style="font-size:20px; color:var(--accent); margin:10px 0;">${price} ₽</div>
                        <button onclick="pay('${name}', ${price})">Купить</button>
                    </div>`;
                document.getElementById('product-list').innerHTML += html;
            } else {
                document.getElementById('article-list').innerHTML += `<div class="glass" style="padding:20px; margin-bottom:10px;"><h3>${name}</h3><p>${desc}</p></div>`;
            }
            alert("Опубликовано!");
            showPage('home');
        }

        // ОПЛАТА
        function pay(title, sum) {
            const url = `https://yoomoney.ru{encodeURIComponent(title)}&sum=${sum}&paymentType=AC&label=${myCard}`;
            window.open(url, '_blank');
        }

        // НАСТРОЙКИ
        function updatePassword() {
            let np = document.getElementById('new-pass').value;
            if(np) { currentPassword = np; alert("Пароль изменен!"); }
        }

        function updateIcon() {
            let ni = document.getElementById('new-icon').value;
            if(ni) { document.getElementById('favicon').href = ni; alert("Иконка обновлена!"); }
        }
    </script>
</body>
</html>
