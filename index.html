<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D — Магазин</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #9d00ff; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 1.5rem; cursor: pointer; text-shadow: 0 0 10px var(--accent); }
        .tabs { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; overflow-x: auto; }
        .tab-btn { background: #161616; border: 1px solid #333; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 0.8rem; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid var(--accent); width: 85%; max-width: 380px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn-action { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .product { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; position: relative; transition: 0.3s; }
        .product img { width: 100%; height: 350px; object-fit: cover; }
        .p-info { padding: 15px; text-align: center; }
        .p-price { color: var(--accent); font-weight: 900; font-size: 1.4rem; margin: 5px 0; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; display: none; z-index: 10; }
        .contact-item { display: block; background: #000; color: white; text-decoration: none; padding: 15px; margin: 10px 0; border: 1px solid #333; border-radius: 10px; transition: 0.3s; }
        .contact-item:hover { border-color: var(--accent); background: #111; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="openModal('login-modal')">R.I.D</div>
    <button style="background:none; border:1px solid var(--accent); color:var(--accent); padding:7px 15px; border-radius:20px; cursor:pointer;" onclick="openModal('contact-modal')">СВЯЗЬ</button>
</nav>

<div class="tabs">
    <button class="tab-btn active" onclick="filterItems('Все')">Все</button>
    <button class="tab-btn" onclick="filterItems('Дрилл')">Дрилл</button>
    <button class="tab-btn" onclick="filterItems('Оверсайз')">Оверсайз</button>
    <button class="tab-btn" onclick="filterItems('Народный')">Народный</button>
</div>

<div id="admin-zone" class="modal">
    <div class="modal-content">
        <h3 style="font-family:'Orbitron'; margin-top:0;">НОВЫЙ ТОВАР</h3>
        <input type="text" id="p-img" placeholder="Ссылка на фото">
        <input type="text" id="p-name" placeholder="Название">
        <input type="text" id="p-price" placeholder="Цена">
        <select id="p-style">
            <option value="Дрилл">Дрилл</option>
            <option value="Оверсайз">Оверсайз</option>
            <option value="Народный">Народный</option>
        </select>
        <button class="btn-action" onclick="saveToFirebase()">ОПУБЛИКОВАТЬ</button>
        <p onclick="closeModal('admin-zone')" style="color:#555; cursor:pointer; margin-top:15px;">ЗАКРЫТЬ</p>
    </div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h3 style="font-family:'Orbitron';">ADMIN</h3>
        <input type="password" id="admin-pass" placeholder="Пароль">
        <button class="btn-action" onclick="checkPass()">ВХОД</button>
        <p onclick="closeModal('login-modal')" style="color:#555; cursor:pointer; margin-top:15px;">ОТМЕНА</p>
    </div>
</div>

<div id="contact-modal" class="modal">
    <div class="modal-content">
        <h3 style="font-family:'Orbitron';">СВЯЗЬ</h3>
        <a href="https://t.me" target="_blank" class="contact-item"><b>📢 КАНАЛ</b></a>
        <a href="https://t.me" target="_blank" class="contact-item"><b>👑 ВЛАДЕЛЕЦ</b></a>
        <a href="https://t.me" target="_blank" class="contact-item"><b>🛡️ ЗАМ / АДМИН</b></a>
        <p onclick="closeModal('contact-modal')" style="color:#555; cursor:pointer; margin-top:15px;">ЗАКРЫТЬ</p>
    </div>
</div>

<div class="catalog" id="list"></div>

<script>
    // ТВОЙ КОНФИГ ИЗ СКРИНШОТА
    const firebaseConfig = {
        apiKey: "AIzaSyCMdjHAttDdvtAAVGKu4S1w_7ZTVUw",
        authDomain: "://firebaseapp.com",
        projectId: "ridd-e1634",
        storageBucket: "ridd-e1634.firebasestorage.app",
        messagingSenderId: "405816096080",
        appId: "1:405816096080:web:dc0b41f667222cd42d2855",
        measurementId: "G-VH5J07K7PK"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentFilter = "Все";
    let allProducts = [];

    db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
        allProducts = [];
        snap.forEach(doc => allProducts.push({ id: doc.id, ...doc.data() }));
        renderItems();
    });

    function renderItems() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        const filtered = allProducts.filter(p => currentFilter === "Все" || p.style === currentFilter);
        filtered.forEach(p => {
            list.innerHTML += `
                <div class="product">
                    <button class="del-btn" onclick="deleteItem('${p.id}')">Удалить</button>
                    <img src="${p.img}" onerror="this.src='https://placeholder.com'">
                    <div class="p-info">
                        <h4 style="margin:0">${p.name}</h4>
                        <div class="p-price">${p.price}</div>
                        <button class="btn-action" onclick="window.open('https://t.me')">КУПИТЬ</button>
                    </div>
                </div>
            `;
        });
    }

    function filterItems(style) {
        currentFilter = style;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === style));
        renderItems();
    }

    async function saveToFirebase() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const style = document.getElementById('p-style').value;
        if(!name || !price || !img) return alert("Заполни всё!");
        await db.collection('products').add({ name, price, img, style, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Опубликовано!");
        closeModal('admin-zone');
    }

    function deleteItem(id) { if(confirm("Удалить?")) db.collection('products').doc(id).delete(); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function checkPass() {
        if(document.getElementById('admin-pass').value === 'rid') {
            closeModal('login-modal'); openModal('admin-zone');
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        } else { alert("Неверно!"); }
    }
</script>
</body>
            </html>
