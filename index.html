<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D — Premium Glass Edition</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --accent: #bc13fe; 
            --bg: #050208; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(188, 19, 254, 0.3);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% -20%, #310a52 0%, transparent 60%);
            min-height: 100vh;
        }

        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; border-bottom: 1px solid var(--glass-border); 
            position: sticky; top: 0; background: rgba(5, 2, 8, 0.9); 
            backdrop-filter: blur(20px); z-index: 100; 
        }
        .logo { font-family: 'Orbitron'; color: #fff; font-size: 1.6rem; cursor: pointer; text-shadow: 0 0 15px var(--accent); }

        .tabs { display: flex; justify-content: center; gap: 10px; padding: 20px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); color: #fff; 
            padding: 10px 22px; border-radius: 15px; cursor: pointer; transition: 0.3s; 
            backdrop-filter: blur(5px); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .tab-btn.active { background: var(--accent); box-shadow: 0 0 20px var(--accent); border-color: #fff; color: #000; font-weight: bold; }

        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 20px 30px; }
        .product { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 25px; overflow: hidden; backdrop-filter: blur(15px); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .product:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(188, 19, 254, 0.2); }
        .product img { width: 100%; height: 340px; object-fit: cover; border-bottom: 1px solid var(--glass-border); }
        .p-info { padding: 20px; text-align: center; }
        .p-price { color: var(--accent); font-weight: 900; font-size: 1.6rem; margin: 10px 0; font-family: 'Orbitron'; }

        .btn-action { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { box-shadow: 0 0 20px var(--accent); transform: scale(1.02); }

        .footer-socials { display: flex; justify-content: center; gap: 15px; padding: 60px 20px; flex-wrap: wrap; }
        .soc-link { background: var(--glass); border: 1px solid var(--glass-border); color: #fff; padding: 12px 25px; border-radius: 50px; text-decoration: none; transition: 0.3s; font-size: 0.8rem; }
        .soc-link:hover { background: #fff; color: #000; border-color: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #0d0616; padding: 35px; border-radius: 30px; border: 1px solid var(--accent); width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px rgba(188, 19, 254, 0.2); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; }
        .del-btn { position: absolute; top: 15px; right: 15px; background: rgba(255, 0, 0, 0.7); border: none; color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; display: none; z-index: 10; font-size: 0.7rem; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="openModal('login-modal')">R.I.D</div>
    <div style="font-family: 'Orbitron'; font-size: 0.6rem; color: var(--accent); letter-spacing: 2px;">GLASS EDITION</div>
</nav>

<div class="tabs" id="cat-bar"></div>
<div class="catalog" id="list"></div>
<div class="footer-socials" id="social-bar"></div>

<!-- АДМИНКА -->
<div id="admin-zone" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; color: var(--accent); margin-top:0;">ПАНЕЛЬ</h2>
        
        <p style="color:#666; font-size:0.7rem; text-transform:uppercase;">📦 ТОВАР</p>
        <input type="text" id="p-img" placeholder="Ссылка на фото">
        <input type="text" id="p-name" placeholder="Название">
        <input type="text" id="p-price" placeholder="Цена">
        <select id="p-style"></select>
        <button class="btn-action" onclick="saveProduct()">ОПУБЛИКОВАТЬ</button>

        <p style="color:#666; font-size:0.7rem; text-transform:uppercase; margin-top:30px;">📂 КАТЕГОРИЯ</p>
        <input type="text" id="new-cat" placeholder="Название стиля">
        <button class="btn-action" style="background:#222" onclick="addCategory()">+ ДОБАВИТЬ</button>

        <p style="color:#666; font-size:0.7rem; text-transform:uppercase; margin-top:30px;">🔗 СОЦСЕТИ</p>
        <input type="text" id="soc-name" placeholder="Название (напр. Telegram)">
        <input type="text" id="soc-link" placeholder="Ссылка (https://...)">
        <button class="btn-action" style="background:#222" onclick="addSocial()">+ ДОБАВИТЬ ССЫЛКУ</button>

        <button class="btn-action" style="background:none; border:1px solid #333; margin-top:30px; color:#555" onclick="closeModal('admin-zone')">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron';">ВХОД</h2>
        <input type="password" id="admin-pass" placeholder="Пароль">
        <button class="btn-action" onclick="checkPass()">АВТОРИЗАЦИЯ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCMdjHAttDdvtAAVGKu4S1w_7ZTVUw",
        authDomain: "://firebaseapp.com",
        projectId: "ridd-e1634",
        storageBucket: "ridd-e1634.firebasestorage.app",
        messagingSenderId: "405816096080",
        appId: "1:405816096080:web:dc0b41f667222cd42d2855",
        measurementId: "G-VH5J07K7PK"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentFilter = "Все";
    let categories = JSON.parse(localStorage.getItem('rid_v2_cats')) || ["Все", "Дрилл", "Оверсайз"];
    let socials = JSON.parse(localStorage.getItem('rid_v2_socs')) || [{name: "Telegram", url: "https://t.me"}];

    function renderAll() {
        // Категории
        const catBar = document.getElementById('cat-bar');
        catBar.innerHTML = categories.map(c => `<button class="tab-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('');
        const sel = document.getElementById('p-style');
        sel.innerHTML = categories.filter(c => c !== "Все").map(c => `<option>${c}</option>`).join('');

        // Соцсети
        const socBar = document.getElementById('social-bar');
        socBar.innerHTML = socials.map(s => `<a href="${s.url}" target="_blank" class="soc-link">${s.name}</a>`).join('');

        // Товары
        db.collection('products').orderBy('createdAt', 'desc').onSnapshot(snap => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                if(currentFilter === "Все" || p.style === currentFilter) {
                    list.innerHTML += `
                        <div class="product">
                            <button class="del-btn" onclick="deleteItem('${doc.id}')">Удалить</button>
                            <img src="${p.img}" onerror="this.src='https://placeholder.com'">
                            <div class="p-info">
                                <h3 style="font-family:'Orbitron'; font-size:1rem; letter-spacing:1px;">${p.name}</h3>
                                <div class="p-price">${p.price}</div>
                                <button class="btn-action" onclick="window.open('${socials[0]?.url || '#'}')">КУПИТЬ</button>
                            </div>
                        </div>
                    `;
                }
            });
        });
    }

    function setFilter(c) { currentFilter = c; renderAll(); }
    function addCategory() {
        const val = document.getElementById('new-cat').value;
        if(val) { categories.push(val); localStorage.setItem('rid_v2_cats', JSON.stringify(categories)); renderAll(); alert("Стиль добавлен!"); }
    }
    function addSocial() {
        const name = document.getElementById('soc-name').value;
        const url = document.getElementById('soc-link').value;
        if(name && url) { socials.push({name, url}); localStorage.setItem('rid_v2_socs', JSON.stringify(socials)); renderAll(); alert("Соцсеть добавлена!"); }
    }
    async function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-img').value;
        const style = document.getElementById('p-style').value;
        if(!name || !price || !img) return alert("Заполни данные!");
        await db.collection('products').add({ name, price, img, style, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Товар опубликован!");
    }

    function deleteItem(id) { if(confirm("Удалить?")) db.collection('products').doc(id).delete(); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function checkPass() {
        if(document.getElementById('admin-pass').value === 'rid') {
            closeModal('login-modal'); openModal('admin-zone');
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'block');
        }
    }
    renderAll();
</script>
</body>
</html>
