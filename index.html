<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D LEGION — Premium Store</title>
    <!-- Подключаем стильный шрифт -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #ff0000; /* Ярко-красный неон */
            --accent-dim: #550000;
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Анимированный фон и логотип */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent-dim);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text);
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 5px;
        }

        /* Кнопки меню */
        .nav-btns button {
            background: none;
            border: 1px solid var(--accent-dim);
            color: white;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            transition: 0.3s;
            margin-left: 10px;
        }

        .nav-btns button:hover {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        /* Фильтр каталогов */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }

        .cat-btn {
            background: var(--card);
            border: 1px solid #333;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cat-btn.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        /* Карточки товаров */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 40px;
        }

        .product-card {
            background: var(--card);
            border-radius: 0px; /* Острые углы для стиля Legion */
            border: 1px solid #1a1a1a;
            padding: 0;
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .product-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }

        .product-img {
            height: 300px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .product-info {
            padding: 20px;
            background: linear-gradient(to top, #000, transparent);
        }

        .product-info h3 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 1.1rem;
        }

        .price {
            color: var(--accent);
            font-weight: 900;
            font-size: 1.4rem;
            margin: 10px 0;
        }

        .buy-btn {
            background: var(--text);
            color: black;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            border: 1px solid var(--accent);
            padding: 40px;
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            color: gray;
            cursor: pointer;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">R.I.D</div>
    <div class="nav-btns">
        <button onclick="toggleView('admin-modal')">ADMIN</button>
        <button onclick="toggleView('profile-modal')" id="login-btn">PROFILE</button>
    </div>
</nav>

<div class="container">
    <div class="categories">
        <button class="cat-btn active" onclick="filterCat('all')">Все</button>
        <button class="cat-btn" onclick="filterCat('Одежда')">Одежда</button>
        <button class="cat-btn" onclick="filterCat('Аксессуары')">Аксессуары</button>
    </div>

    <div class="grid" id="catalog"></div>
</div>

<!-- Модалка Профиля/Регистрации -->
<div id="profile-modal" class="modal">
    <span class="close-modal" onclick="toggleView('profile-modal')">✕</span>
    <div id="auth-form">
        <h2 style="font-family: 'Orbitron'">Вход в Легион</h2>
        <input type="text" id="user-name" placeholder="Твое Имя">
        <input type="email" id="user-email" placeholder="Твоя Почта">
        <button class="buy-btn" onclick="login()">Зарегистрироваться</button>
    </div>
    <div id="user-info" style="display:none;">
        <h2 id="welcome-msg" style="font-family: 'Orbitron'"></h2>
        <p id="user-mail-display" style="color: gray;"></p>
        <h4>История заказов:</h4>
        <div id="order-history" style="font-size: 0.8rem; border-top: 1px solid #333; padding-top: 10px;"></div>
        <button onclick="logout()" style="margin-top:20px; background:none; color:red; border:none; cursor:pointer;">ВЫЙТИ</button>
    </div>
</div>

<!-- Модалка Админа -->
<div id="admin-modal" class="modal">
    <span class="close-modal" onclick="toggleView('admin-modal')">✕</span>
    <h3>Доступ админа</h3>
    <input type="password" id="admin-pass" placeholder="Пароль">
    <button class="buy-btn" onclick="checkAdmin()">Вход</button>
    <div id="admin-controls" style="display:none; margin-top:20px;">
        <input type="text" id="p-name" placeholder="Название">
        <input type="text" id="p-price" placeholder="Цена">
        <select id="p-cat" class="admin-input" style="width:100%; padding:10px; background:#000; color:#fff;">
            <option>Одежда</option>
            <option>Аксессуары</option>
        </select>
        <button class="buy-btn" onclick="addItem()" style="margin-top:10px">Добавить</button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('rid_v2_prod')) || [
        {name: "Legion Hoodie", price: "5500 ₽", cat: "Одежда", img: "💀"},
        {name: "R.I.D Mask", price: "1200 ₽", cat: "Аксессуары", img: "👺"}
    ];
    let currentUser = JSON.parse(localStorage.getItem('rid_v2_user')) || null;
    let orders = JSON.parse(localStorage.getItem('rid_v2_orders')) || [];

    function render(filter = 'all') {
        const catalog = document.getElementById('catalog');
        catalog.innerHTML = '';
        products.forEach((p) => {
            if(filter === 'all' || p.cat === filter) {
                catalog.innerHTML += `
                    <div class="product-card">
                        <div class="product-img">${p.img || '📦'}</div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <div class="price">${p.price}</div>
                            <button class="buy-btn" onclick="makeOrder('${p.name}', '${p.price}')">В КОРЗИНУ</button>
                        </div>
                    </div>
                `;
            }
        });
        updateProfileUI();
    }

    function filterCat(cat) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        render(cat);
    }

    function login() {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        if(name && email) {
            const user = {name, email};
            localStorage.setItem('rid_v2_user', JSON.stringify(user));
            currentUser = user;
            render();
        }
    }

    function logout() {
        localStorage.removeItem('rid_v2_user');
        currentUser = null;
        render();
    }

    function makeOrder(name, price) {
        if(!currentUser) {
            alert("Нужна регистрация!");
            toggleView('profile-modal');
            return;
        }
        const order = {user: currentUser.email, item: name, price: price, date: new Date().toLocaleDateString()};
        orders.push(order);
        localStorage.setItem('rid_v2_orders', JSON.stringify(orders));
        alert("Заказ добавлен в профиль!");
        render();
    }

    function updateProfileUI() {
        if(currentUser) {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('welcome-msg').innerText = currentUser.name.toUpperCase();
            document.getElementById('user-mail-display').innerText = currentUser.email;
            document.getElementById('login-btn').innerText = currentUser.name.toUpperCase();
            
            const history = document.getElementById('order-history');
            const myOrders = orders.filter(o => o.user === currentUser.email);
            history.innerHTML = myOrders.map(o => `<div>${o.item} — ${o.price}</div>`).join('') || "Нет заказов";
        } else {
            document.getElementById('auth-form').style.display = 'block';
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('login-btn').innerText = 'PROFILE';
        }
    }

    function toggleView(id) {
        const m = document.getElementById(id);
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function checkAdmin() {
        if(document.getElementById('admin-pass').value === 'rid') {
            document.getElementById('admin-controls').style.display = 'block';
        }
    }

    function addItem() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;
        if(name && price) {
            products.push({name, price, cat});
            localStorage.setItem('rid_v2_prod', JSON.stringify(products));
            render();
        }
    }

    render();
</script>
</body>
</html>
