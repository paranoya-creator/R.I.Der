<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I.D - Store</title>
    <link id="favicon" rel="icon" href="https://flaticon.com">
    <style>
        :root {
            --accent: #8a2be2;
            --bg: #050505;
            --glass: rgba(138, 43, 226, 0.15);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #1a0033 0%, #000 100%);
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .glass {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        header {
            width: 90%; max-width: 1200px; padding: 25px; margin-top: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        h1 { margin: 0; letter-spacing: 5px; color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .container { width: 90%; max-width: 1200px; margin-top: 30px; }

        .shop-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px; margin-top: 30px;
        }

        .card { padding: 20px; text-align: center; transition: 0.4s; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; }

        /* АДМИНКА */
        #admin-zone { display: none; margin-top: 30px; padding: 40px; width: 100%; box-sizing: border-box; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .role-windows { display: flex; gap: 15px; margin-top: 30px; }
        .role-card { flex: 1; padding: 15px; text-align: center; font-size: 12px; border: 1px solid var(--accent); border-radius: 10px; }

        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box;
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            color: white; border-radius: 10px;
        }

        button {
            background: var(--accent); color: white; border: none;
            padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%;
        }

        /* ЧАТ */
        #support-chat {
            position: fixed; bottom: 20px; right: 20px; width: 300px; height: 400px;
            display: flex; flex-direction: column; z-index: 1000;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; }

        .comment-section { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <header class="glass">
        <h1>R.I.D</h1>
        <button onclick="loginAdmin()" style="width: auto; background: transparent; border: 1px solid var(--accent);">Вход (Staff)</button>
    </header>

    <div class="container">
        <section id="main-view">
            <h2>Товары</h2>
            <div id="product-list" class="shop-grid">
                <!-- Товары будут тут -->
            </div>
            
            <h2 style="margin-top: 50px;">Статьи</h2>
            <div id="article-list"></div>
        </section>

        <!-- СКРЫТАЯ АДМИНКА -->
        <section id="admin-zone" class="glass">
            <h2>Админ-панель R.I.D</h2>
            <div class="admin-grid">
                <div>
                    <h3>Добавить контент</h3>
                    <input type="text" id="p-name" placeholder="Название">
                    <input type="number" id="p-price" placeholder="Цена">
                    <input type="text" id="p-img" placeholder="URL картинки">
                    <textarea id="p-desc" placeholder="Описание / Текст статьи"></textarea>
                    <button onclick="addItem('product')">Добавить Товар</button>
                    <button onclick="addItem('article')" style="margin-top:5px; background: #333;">Добавить Статью</button>
                </div>
                <div>
                    <h3>Настройки</h3>
                    <input type="text" id="new-pass" placeholder="Новый пароль">
                    <button onclick="updatePassword()">Сменить пароль</button>
                    <input type="text" id="new-icon" placeholder="URL иконки сайта">
                    <button onclick="updateIcon()">Обновить иконку</button>
                </div>
            </div>

            <div class="role-windows">
                <div class="role-card" style="background: rgba(138,43,226,0.3)">ВЛАДЕЛЕЦ</div>
                <div class="role-card">ЗАМ. ВЛАДЕЛЬЦА</div>
                <div class="role-card">АДМИНИСТРАТОР</div>
            </div>
            <button onclick="location.reload()" style="margin-top:20px; background:red;">Выйти</button>
        </section>
    </div>

    <!-- ПОДДЕРЖКА -->
    <div id="support-chat" class="glass">
        <div style="background: var(--accent); padding: 10px;">Поддержка R.I.D</div>
        <div id="chat-messages"></div>
        <div style="padding:10px;">
            <input type="text" id="chat-input" placeholder="Ваш вопрос..." onkeypress="if(event.key==='Enter') sendMsg()">
        </div>
    </div>

    <script>
        let currentPassword = "Rid1962";
        // ВАША КАРТА / КОШЕЛЕК (п. 13)
        const myCard = "5599002136769405"; 

        function loginAdmin() {
            let p = prompt("Пароль:");
            if (p === currentPassword) {
                document.getElementById('admin-zone').style.display = 'block';
                document.getElementById('main-view').style.display = 'none';
            } else { alert("Отказ!"); }
        }

        function addItem(type) {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value || 'https://placeholder.com';
            const desc = document.getElementById('p-desc').value;

            if(type === 'product') {
                const html = `
                    <div class="card glass">
                        <img src="${img}">
                        <h3>${name}</h3>
                        <p>${desc}</p>
                        <div style="font-size:22px; color:var(--accent); margin:10px 0;">${price} ₽</div>
                        <button onclick="pay('${name}', ${price})">Оплатить МИР</button>
                        <div class="comment-section">
                            <input type="text" placeholder="Оставить отзыв..." style="font-size:10px;">
                        </div>
                    </div>`;
                document.getElementById('product-list').innerHTML += html;
            } else {
                document.getElementById('article-list').innerHTML += `<div class="glass" style="padding:20px; margin-bottom:10px;"><h3>${name}</h3><p>${desc}</p></div>`;
            }
            alert("Готово!");
        }

        function pay(title, sum) {
            // Формирование ссылки через шлюз ЮMoney для вашей карты/кошелька
            const url = `https://yoomoney.ru{encodeURIComponent(title)}&sum=${sum}&paymentType=AC&label=${myCard}`;
            alert("Переход к оплате. Ваша карта МИР принята.");
            window.open(url, '_blank');
        }

        function updatePassword() {
            let np = document.getElementById('new-pass').value;
            if(np) { currentPassword = np; alert("Пароль изменен!"); }
        }

        function updateIcon() {
            let ni = document.getElementById('new-icon').value;
            if(ni) { document.getElementById('favicon').href = ni; alert("Иконка изменена!"); }
        }

        function sendMsg() {
            let i = document.getElementById('chat-input');
            if(!i.value) return;
            document.getElementById('chat-messages').innerHTML += `<div style="text-align:right; margin:5px;">${i.value}</div>`;
            setTimeout(() => {
                document.getElementById('chat-messages').innerHTML += `<div style="color:var(--accent); margin:5px;">Оператор R.I.D скоро ответит.</div>`;
            }, 1000);
            i.value = '';
        }
    </script>
</body>
</html>
